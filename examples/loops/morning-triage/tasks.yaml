# Reference task config for the morning-triage loop. You normally don't edit
# this file by hand — tell modu_code "每个工作日早上 6 点跑 /morning-triage,
# 目标是更新 state/triage.md" and cron_add writes ~/.modu/cron/tasks.yaml.
#
# Cap Before You Ship: all three per-task breakers are set BEFORE the loop's
# first unattended run, plus the per-task daily budget in config.yaml.
tasks:
  - id: morning-triage
    cron: "0 0 6 * * 1-5"        # 06:00 on weekdays (sec min hour dom mon dow)
    timezone: Asia/Shanghai      # pin the schedule; survives machine moves
    prompt: "/morning-triage"    # slash form invokes the installed skill
    # goal: makes the run a real loop turn — the runner creates a session
    # goal before the prompt, the goal verifier (maker-checker) judges
    # completion, and run_end records goal_status.
    goal: "Triage today's actionable CI/issues changes, update state/triage.md, and leave every uncertain or blocked item in inbox/"
    enabled: true
    on_overlap: skip
    timeout: 30m                 # per-run wall-clock breaker
    max_tokens_per_run: 400000   # per-run token breaker (input+output)
    max_retries: 1               # retry plain errors once; cap trips never retry
    channels: [feishu-daily]     # completion notice: status, summary, new inbox items, PR links

  # Quick functional verification (see README「快速功能验证」): a short,
  # high-frequency, throwaway loop that proves Scheduling→Goal→Verifier→State
  # in a few minutes. Add it when you want to check the pipeline, delete it
  # right after — never leave it enabled.
